<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Focus Timer Test</title>
    <link rel="stylesheet" href="FocusTimer.css" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }
    </style>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useEffect, useRef, useState } = React;

      const DEFAULT_SECONDS = 25 * 60;

      function FocusTimer() {
        const [secondsLeft, setSecondsLeft] = useState(DEFAULT_SECONDS);
        const [isRunning, setIsRunning] = useState(false);
        const intervalRef = useRef(null);

        useEffect(() => {
          if (!isRunning) {
            return undefined;
          }

          intervalRef.current = window.setInterval(() => {
            setSecondsLeft((prev) => {
              if (prev <= 1) {
                setIsRunning(false);
                return 0;
              }
              return prev - 1;
            });
          }, 1000);

          return () => {
            window.clearInterval(intervalRef.current);
          };
        }, [isRunning]);

        useEffect(() => {
          return () => {
            window.clearInterval(intervalRef.current);
          };
        }, []);

        const minutes = String(Math.floor(secondsLeft / 60)).padStart(2, '0');
        const seconds = String(secondsLeft % 60).padStart(2, '0');

        const handleStart = () => {
          if (secondsLeft === 0) {
            setSecondsLeft(DEFAULT_SECONDS);
          }
          setIsRunning(true);
        };

        const handlePause = () => {
          setIsRunning(false);
        };

        const handleReset = () => {
          setIsRunning(false);
          setSecondsLeft(DEFAULT_SECONDS);
        };

        return (
          <div className="focus-timer">
            <div className="focus-timer__card">
              <h2 className="focus-timer__title">Таймер фокусування</h2>
              <div className="focus-timer__display" aria-live="polite">
                {minutes}:{seconds}
              </div>
              <div className="focus-timer__controls">
                <button
                  className="focus-timer__button focus-timer__button--primary"
                  type="button"
                  onClick={handleStart}
                  disabled={isRunning}
                >
                  Start
                </button>
                <button
                  className="focus-timer__button focus-timer__button--secondary"
                  type="button"
                  onClick={handlePause}
                  disabled={!isRunning}
                >
                  Pause
                </button>
                <button
                  className="focus-timer__button focus-timer__button--reset"
                  type="button"
                  onClick={handleReset}
                >
                  Reset
                </button>
              </div>
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<FocusTimer />);
    </script>
  </body>
</html>
